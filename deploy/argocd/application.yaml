apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finance-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Petar-Dev-Port/finance-tracker.git
    targetRevision: main
    path: deploy/base
  destination:
    server: https://kubernetes.default.svc
    namespace: finance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true