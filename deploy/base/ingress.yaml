apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-tracker
  namespace: finance
  labels:
    app: finance-tracker
spec:
  ingressClassName: traefik
  rules:
  - host: finance.localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finance-tracker
            port:
              number: 80